<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>news and book translator</title>
  <style>
    :root {
      --bg: #0a0d14;
      --panel: #131827;
      --panel-soft: #1a2236;
      --text: #eef2ff;
      --muted: #9ca8c7;
      --accent: #67b3ff;
      --accent-strong: #2f8cff;
      --border: #2a3551;
      --danger: #ff7373;
      --ok: #84e1aa;
      --shadow: 0 18px 36px rgba(0, 0, 0, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans", "Tahoma", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #1a2440 0%, var(--bg) 52%, #06090f 100%);
      min-height: 100vh;
    }

    body.has-now-speaking .app {
      margin-top: 100px;
    }

    .app {
      width: min(980px, 94vw);
      margin: 24px auto 48px;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: linear-gradient(155deg, rgba(20, 26, 44, 0.9), rgba(10, 12, 20, 0.97));
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 3vw, 2rem);
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.95rem;
    }

    .controls {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 120px;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    label {
      font-size: 0.82rem;
      color: var(--muted);
    }

    input,
    button {
      border-radius: 10px;
      border: 1px solid var(--border);
      font: inherit;
    }

    input {
      width: 100%;
      background: var(--panel-soft);
      color: var(--text);
      padding: 11px 12px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(103, 179, 255, 0.18);
    }

    .actions {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }


    .btn {
      background: var(--panel-soft);
      color: var(--text);
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.2s ease, background-color 0.2s ease;
    }

    .btn:hover {
      border-color: var(--accent);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: linear-gradient(140deg, var(--accent), var(--accent-strong));
      color: #04111f;
      border: 0;
      font-weight: 700;
    }

    .status {
      margin-top: 14px;
      min-height: 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--danger);
    }

    .cards {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .card {
      border: 1px solid var(--border);
      background: rgba(18, 24, 40, 0.86);
      border-radius: 14px;
      padding: 12px;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .card-head-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lang-block {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 10px;
      margin-top: 8px;
    }

    .lang-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .lang-name {
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .speak-btn {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 6px 9px;
      font-size: 0.78rem;
      cursor: pointer;
      border-radius: 9px;
    }

    .speak-btn:hover {
      border-color: var(--accent);
    }

    .lang-text {
      margin: 0;
      line-height: 1.45;
      word-break: break-word;
      font-size: 1.02rem;
    }

    .lang-text.fa {
      direction: rtl;
      text-align: right;
      font-family: "Noto Naskh Arabic", "Tahoma", sans-serif;
    }

    .lang-text.is-speaking,
    .sentence-text.is-speaking,
    #nowSpeakingText.is-speaking {
      color: #f8fbff;
    }

    .speech-word {
      transition: background-color 0.08s ease, color 0.08s ease;
      border-radius: 4px;
      padding: 0 1px;
    }

    .speech-word.active {
      background: rgba(103, 179, 255, 0.22);
      color: #ffffff;
    }

    .source-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.78rem;
      text-transform: none;
      letter-spacing: normal;
    }

    .source-link:hover {
      text-decoration: underline;
    }

    .article-panel {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(11, 16, 27, 0.8);
    }

    .article-panel[hidden] {
      display: none;
    }

    .article-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }

    .article-status {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .sentence-list {
      display: grid;
      gap: 8px;
      max-height: 420px;
      overflow: auto;
      padding-right: 4px;
    }

    .sentence-row {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      background: var(--panel);
    }

    .sentence-row.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(103, 179, 255, 0.35) inset;
    }

    .sentence-row-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .sentence-index-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      padding: 4px 7px;
      border-radius: 8px;
      font-size: 0.74rem;
    }

    .sentence-index-btn:hover {
      border-color: var(--accent);
    }

    .sentence-lang {
      margin: 4px 0 0;
      font-size: 0.88rem;
      line-height: 1.4;
    }

    .sentence-prefix {
      color: var(--muted);
      margin-right: 4px;
    }

    .sentence-text.fa {
      direction: rtl;
      text-align: right;
      font-family: "Noto Naskh Arabic", "Tahoma", sans-serif;
      display: inline-block;
      width: 100%;
    }

    .sentence-lang.fa {
      direction: rtl;
      text-align: right;
      font-family: "Noto Naskh Arabic", "Tahoma", sans-serif;
    }

    .book-meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .book-title {
      margin: 8px 0 0;
      font-size: 1.02rem;
      line-height: 1.5;
    }

    .book-title.fa {
      direction: rtl;
      text-align: right;
      font-family: "Noto Naskh Arabic", "Tahoma", sans-serif;
    }

    .now-speaking-box {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: min(980px, 94vw);
      background: rgba(8, 13, 24, 0.96);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.3);
      padding: 10px 12px;
      z-index: 999;
      backdrop-filter: blur(4px);
    }

    .now-speaking-box[hidden] {
      display: none;
    }

    .now-speaking-meta {
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .now-speaking-text {
      margin: 6px 0 0;
      line-height: 1.45;
      word-break: break-word;
      font-size: 0.97rem;
    }

    @media (max-width: 680px) {
      body.has-now-speaking .app {
        margin-top: 118px;
      }

      .app {
        margin-top: 14px;
        padding: 14px;
        border-radius: 16px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

    }
  </style>
</head>
<body>
  <aside id="nowSpeakingBox" class="now-speaking-box" hidden aria-live="polite">
    <div id="nowSpeakingMeta" class="now-speaking-meta"></div>
    <p id="nowSpeakingText" class="now-speaking-text"></p>
  </aside>

  <main class="app">
    <h1>news and book translator</h1>

    <form id="controls" novalidate>
      <div class="controls">
        <div class="field">
          <label for="maxItems">Count</label>
          <input id="maxItems" type="number" min="1" max="25" value="8" required>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="fetchBtn" type="submit">Fetch + Translate</button>
        <button class="btn" id="loadNewBtn" type="button">Load 8 New</button>
        <button class="btn" id="loadBookBtn" type="button">Load Random Book</button>
        <button class="btn" id="readAllHeadlinesBtn" type="button">Read All Headlines</button>
        <button class="btn" id="playAllArticlesBtn" type="button">Read All Articles</button>
        <button class="btn" id="stopSpeechBtn" type="button">Stop Speech</button>
      </div>
    </form>

    <p id="status" class="status" role="status" aria-live="polite"></p>
    <section id="cards" class="cards" aria-live="polite"></section>
  </main>

  <script>
    (() => {
      const SOURCE_URL = "https://ground.news";
      const MAX_ARTICLE_SENTENCES = 14;
      const BOOK_BATCH_SIZE = 18;
      const MAX_BOOK_SENTENCE_POOL = 420;
      const PIPER_ESM_URL = "https://esm.sh/@mintplex-labs/piper-tts-web@1.0.4";
      const PIPER_FA_VOICE_ID = "fa_IR-amir-medium";
      const PIPER_FA_CHUNK_MAX = 260;
      const proxyCandidates = [
        {
          name: "AllOrigins",
          build: (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
        },
        {
          name: "Jina AI Reader",
          build: (url) => `https://r.jina.ai/http://${url.replace(/^https?:\/\//i, "")}`
        }
      ];

      const controls = document.getElementById("controls");
      const maxItemsInput = document.getElementById("maxItems");
      const loadNewBtn = document.getElementById("loadNewBtn");
      const loadBookBtn = document.getElementById("loadBookBtn");
      const readAllHeadlinesBtn = document.getElementById("readAllHeadlinesBtn");
      const playAllArticlesBtn = document.getElementById("playAllArticlesBtn");
      const statusEl = document.getElementById("status");
      const cardsEl = document.getElementById("cards");
      const stopSpeechBtn = document.getElementById("stopSpeechBtn");
      const nowSpeakingBox = document.getElementById("nowSpeakingBox");
      const nowSpeakingMeta = document.getElementById("nowSpeakingMeta");
      const nowSpeakingText = document.getElementById("nowSpeakingText");

      const state = {
        activeAudio: null,
        activeAudioObjectUrl: "",
        audioPlaybackToken: 0,
        activeUtterance: null,
        contentMode: "news",
        voices: [],
        piperModule: null,
        piperReady: false,
        piperLoading: false,
        translationCache: new Map(),
        currentSpeakKey: "",
        translatedHeadlines: [],
        articleData: new Map(),
        playbackToken: 0,
        seenHeadlineKeys: new Set(),
        playbackMode: "none",
        headlinePlayback: {
          active: false,
          headlineIndex: 0,
          langStep: 0
        },
        globalPlayback: {
          active: false,
          headlineIndex: 0,
          sentenceIndex: 0
        },
        piperVoiceId: PIPER_FA_VOICE_ID,
        activeSpeechVisual: null,
        isIOS: /iP(hone|od|ad)/i.test(navigator.userAgent || "") ||
          (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1),
        isSafari: /^((?!chrome|android).)*safari/i.test(navigator.userAgent || "")
      };

      const translationEndpoint = "https://translate.googleapis.com/translate_a/single";
      const STANDARD_EBOOKS_LIST_URL = "https://standardebooks.org/ebooks";
      const rejectHeadlinePattern = /^(top news|top stories|daily briefing|latest .+ news|.+ blindspots?|blindspot|news|local|for you|search|subscribe|login|company|help|tools|trending topics|my news bias)$/i;

      function setStatus(message, type) {
        statusEl.textContent = message;
        statusEl.className = "status";
        if (type) {
          statusEl.classList.add(type);
        }
      }

      function hasPausedHeadlinePlayback() {
        return state.headlinePlayback.headlineIndex > 0 || state.headlinePlayback.langStep > 0;
      }

      function hasPausedGlobalPlayback() {
        return state.globalPlayback.headlineIndex > 0 || state.globalPlayback.sentenceIndex > 0;
      }

      function getHeadlinePauseLabel() {
        if (!state.translatedHeadlines.length) {
          return "Speech stopped.";
        }

        if (state.headlinePlayback.headlineIndex >= state.translatedHeadlines.length) {
          return "Paused at end of loaded headlines.";
        }

        const steps = ["EN", "FA", "RU"];
        const headline = Math.max(0, state.headlinePlayback.headlineIndex) + 1;
        const step = steps[Math.min(Math.max(state.headlinePlayback.langStep, 0), steps.length - 1)];
        return `Paused at headline ${headline}, ${step}.`;
      }

      function getGlobalPauseLabel() {
        if (!state.translatedHeadlines.length) {
          return "Speech stopped.";
        }

        if (state.contentMode === "book") {
          const record = state.articleData.get(0);
          const maxSentence = record?.sentences?.length || 1;
          const sentence = Math.min(Math.max(state.globalPlayback.sentenceIndex + 1, 1), maxSentence);
          return `Paused at sentence ${sentence}.`;
        }

        if (state.globalPlayback.headlineIndex >= state.translatedHeadlines.length) {
          return "Paused at end of loaded articles.";
        }

        const articleIndex = Math.max(0, state.globalPlayback.headlineIndex);
        const record = state.articleData.get(articleIndex);
        const maxSentence = record?.sentences?.length || 1;
        const sentence = Math.min(Math.max(state.globalPlayback.sentenceIndex + 1, 1), maxSentence);
        return `Paused at article ${articleIndex + 1}, sentence ${sentence}.`;
      }

      function updateLoadNewButtonLabel() {
        if (!loadNewBtn) {
          return;
        }
        loadNewBtn.textContent = `Load ${getRequestedCount()} New`;
      }

      function updateReadAllHeadlinesButtonLabel() {
        if (!readAllHeadlinesBtn) {
          return;
        }

        if (state.contentMode === "book") {
          readAllHeadlinesBtn.textContent = "Read All Headlines";
          readAllHeadlinesBtn.disabled = true;
          return;
        }

        if (state.playbackMode === "headlines" && state.headlinePlayback.active) {
          readAllHeadlinesBtn.textContent = "Reading...";
          readAllHeadlinesBtn.disabled = true;
          return;
        }

        readAllHeadlinesBtn.disabled = state.playbackMode === "articles";
        readAllHeadlinesBtn.textContent = hasPausedHeadlinePlayback() ? "Resume Headlines" : "Read All Headlines";
      }

      function updatePlayAllButtonLabel() {
        if (!playAllArticlesBtn) {
          return;
        }

        if (state.contentMode === "book") {
          if (state.playbackMode === "articles" && state.globalPlayback.active) {
            playAllArticlesBtn.textContent = "Reading...";
            playAllArticlesBtn.disabled = true;
            return;
          }

          playAllArticlesBtn.disabled = false;
          playAllArticlesBtn.textContent = hasPausedGlobalPlayback() ? "Resume Book" : "Read Book Sentences";
          return;
        }

        if (state.playbackMode === "articles" && state.globalPlayback.active) {
          playAllArticlesBtn.textContent = "Reading...";
          playAllArticlesBtn.disabled = true;
          return;
        }

        playAllArticlesBtn.disabled = state.playbackMode === "headlines";
        playAllArticlesBtn.textContent = hasPausedGlobalPlayback() ? "Resume Articles" : "Read All Articles";
      }

      function updatePlaybackButtons() {
        updatePlayAllButtonLabel();
        updateReadAllHeadlinesButtonLabel();
      }

      function normalizeSpaces(text) {
        return text.replace(/\s+/g, " ").trim();
      }

      function cleanHeadline(raw) {
        if (!raw) {
          return "";
        }

        let text = normalizeSpaces(raw)
          .replace(/^#+\s*/g, "")
          .replace(/!\[[^\]]*\]\([^)]*\)/g, "")
          .replace(/!\[image[^\]]*$/gi, "")
          .replace(/!\[[^\]]*$/g, "")
          .replace(/\b\d+\s*stories?\s*[•|]\s*\d+\s*articles?\s*[•|]\s*\d+\s*m\s*read\b/gi, "")
          .replace(/\b\d+\s*stories?\b/gi, "")
          .replace(/\b\d+\s*articles?\b/gi, "")
          .replace(/\b\d+\s*m\s*read\b/gi, "")
          .replace(/[•|]/g, " ")
          .replace(/\s+coverage:\s*\d+\s+sources?/gi, "")
          .replace(/\b(left|center|right)\s*\d+%/gi, "")
          .replace(/\b\d+%\s*(left|center|right)\b/gi, "")
          .replace(/\b[LR]\s*\d+%\b/g, "")
          .replace(/\s*REUTERS\s*\/.*$/i, "")
          .replace(/\s*—\s*REUTERS\s*\/.*$/i, "")
          .replace(/\s+!\[[^\]]*$/g, "")
          .replace(/^\W+|\W+$/g, "");

        const repeatedSegment = text.match(/^(.{24,140}?)\s+\1$/i);
        if (repeatedSegment) {
          text = repeatedSegment[1];
        }

        text = normalizeSpaces(text);

        if (!text || text.length < 28 || text.length > 220) {
          return "";
        }

        if (/stories?\s+articles?\s+m\s+read/i.test(text) || /\[image/i.test(text)) {
          return "";
        }

        if (rejectHeadlinePattern.test(text)) {
          return "";
        }

        return text;
      }

      function canonicalKey(headline) {
        return headline.toLowerCase().replace(/[^\p{L}\p{N}]+/gu, "").trim();
      }

      function normalizeGroundLink(href) {
        if (!href) {
          return "";
        }
        if (/^https?:\/\//i.test(href)) {
          return href;
        }
        if (href.startsWith("/")) {
          return `https://ground.news${href}`;
        }
        return `https://ground.news/${href.replace(/^\/+/, "")}`;
      }

      function isGroundArticleLink(link) {
        return Boolean(link && /^https?:\/\/ground\.news\/article\//i.test(link));
      }

      function normalizeStandardEbookLink(href) {
        if (!href) {
          return "";
        }

        try {
          const url = new URL(href, "https://standardebooks.org");
          const host = url.hostname.toLowerCase();
          if (host !== "standardebooks.org" && host !== "www.standardebooks.org") {
            return "";
          }
          const path = url.pathname.replace(/\/+$/, "");
          return `${url.origin}${path || "/"}`;
        } catch (error) {
          return "";
        }
      }

      function isStandardEbookWorkLink(link) {
        if (!link) {
          return false;
        }

        try {
          const url = new URL(link);
          if (!/^standardebooks\.org$/i.test(url.hostname) && !/^www\.standardebooks\.org$/i.test(url.hostname)) {
            return false;
          }

          const segments = url.pathname.split("/").filter(Boolean);
          if (!segments.length || segments[0].toLowerCase() !== "ebooks") {
            return false;
          }

          if (segments.length < 3) {
            return false;
          }

          const disallowed = new Set([
            "text",
            "single-page",
            "downloads",
            "download",
            "metadata",
            "about",
            "collections",
            "contributors",
            "new-releases",
            "popular",
            "rss",
            "feed",
            "search"
          ]);

          return !segments.some((segment) => disallowed.has(segment.toLowerCase()));
        } catch (error) {
          return false;
        }
      }

      function cleanBookTitle(raw) {
        if (!raw) {
          return "";
        }

        const title = normalizeSpaces(String(raw || "").replace(/\s+by\s+.+$/i, ""));
        if (title.length < 2 || title.length > 180) {
          return "";
        }

        if (/^(ebooks|all ebooks|standard ebooks|download|read online|about|collections?)$/i.test(title)) {
          return "";
        }

        return title;
      }

      function bookTitleFromUrl(link) {
        try {
          const url = new URL(link);
          const segments = url.pathname.split("/").filter(Boolean);
          if (segments.length < 3) {
            return "Random Standard Ebooks Title";
          }
          const raw = segments[2];
          return raw
            .split("-")
            .filter(Boolean)
            .map((part) => part[0].toUpperCase() + part.slice(1))
            .join(" ");
        } catch (error) {
          return "Random Standard Ebooks Title";
        }
      }

      function extractStandardEbooksFromHtml(html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        const books = [];
        const seen = new Set();

        for (const anchor of doc.querySelectorAll("a[href]")) {
          const link = normalizeStandardEbookLink(anchor.getAttribute("href"));
          if (!isStandardEbookWorkLink(link) || seen.has(link)) {
            continue;
          }

          const titleCandidates = [
            anchor.getAttribute("title") || "",
            anchor.getAttribute("aria-label") || "",
            anchor.textContent || ""
          ];
          const title = titleCandidates.map((candidate) => cleanBookTitle(candidate)).find(Boolean) || bookTitleFromUrl(link);
          seen.add(link);
          books.push({ title, link });
        }

        return books;
      }

      function extractStandardEbooksFromMarkdown(markdown) {
        const books = [];
        const seen = new Set();
        const linkPattern = /\[([^\]]+)\]\((https?:\/\/[^)]+|\/[^)]+)\)/g;
        let match;

        while ((match = linkPattern.exec(markdown)) !== null) {
          const link = normalizeStandardEbookLink(match[2]);
          if (!isStandardEbookWorkLink(link) || seen.has(link)) {
            continue;
          }
          const title = cleanBookTitle(match[1]) || bookTitleFromUrl(link);
          seen.add(link);
          books.push({ title, link });
        }

        return books;
      }

      async function fetchRandomStandardEbook() {
        const tasks = proxyCandidates.map(async (proxy) => {
          const body = await fetchText(proxy.build(STANDARD_EBOOKS_LIST_URL), { timeoutMs: 22000, retries: 1 });
          const fromHtml = extractStandardEbooksFromHtml(body);
          const books = fromHtml.length ? fromHtml : extractStandardEbooksFromMarkdown(body);
          if (!books.length) {
            throw new Error(`${proxy.name}: no books found`);
          }
          return { books, proxy: proxy.name };
        });

        const settled = await Promise.allSettled(tasks);
        const successful = settled
          .filter((result) => result.status === "fulfilled")
          .map((result) => result.value);

        if (!successful.length) {
          const failures = settled
            .filter((result) => result.status === "rejected")
            .map((result) => result.reason?.message || String(result.reason));
          throw new Error(failures.join(" | "));
        }

        successful.sort((a, b) => b.books.length - a.books.length);
        const winner = successful[0];
        const random = winner.books[Math.floor(Math.random() * winner.books.length)];
        return { book: random, proxy: winner.proxy };
      }

      function getSourceCandidates(sourceUrl) {
        const trimmed = normalizeSpaces(sourceUrl || "");
        if (!trimmed) {
          return [];
        }

        const candidates = [];
        const seen = new Set();
        const add = (candidate) => {
          const value = normalizeSpaces(candidate || "").replace(/\/+$/, "");
          if (!value || seen.has(value)) {
            return;
          }
          seen.add(value);
          candidates.push(value);
        };

        if (/standardebooks\.org/i.test(trimmed)) {
          const normalized = trimmed.replace(/\/+$/, "");
          const root = normalized
            .replace(/\/text\/single-page$/i, "")
            .replace(/\/text$/i, "");
          add(`${root}/text/single-page`);
          add(`${root}/text`);
          add(root);
          return candidates;
        }

        add(trimmed);
        return candidates;
      }

      function extractHeadlineLinksFromMarkdown(markdown) {
        const linksByHeadlineKey = new Map();
        const linkPattern = /\[([^\]]+)\]\((https?:\/\/[^)]+|\/[^)]+)\)/g;
        let match;

        while ((match = linkPattern.exec(markdown)) !== null) {
          const rawLabel = normalizeSpaces(match[1] || "");
          const link = normalizeGroundLink(match[2] || "");
          if (!rawLabel || !link || !/\/article\//i.test(link)) {
            continue;
          }

          const label = rawLabel.replace(/^#{1,6}\s+/, "");
          const cleanLabel = cleanHeadline(label);
          if (!cleanLabel) {
            continue;
          }

          const key = canonicalKey(cleanLabel);
          if (!key) {
            continue;
          }

          if (!linksByHeadlineKey.has(key) || /\/article\//i.test(link)) {
            linksByHeadlineKey.set(key, link);
          }
        }

        return linksByHeadlineKey;
      }

      function extractHeadlinesFromHtml(html, maxItems) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");

        const candidates = [
          ...doc.querySelectorAll("h4[title], h2[title], h4, h2, h3")
        ];

        const seen = new Set();
        const headlines = [];
        const linksByHeadlineKey = new Map();
        const orderedArticleLinks = [];
        const seenOrderedLinks = new Set();
        let fallbackLinkIndex = 0;

        for (const anchor of doc.querySelectorAll("a[href]")) {
          const link = normalizeGroundLink(anchor.getAttribute("href"));
          if (!link) {
            continue;
          }

          if (isGroundArticleLink(link) && !seenOrderedLinks.has(link)) {
            seenOrderedLinks.add(link);
            orderedArticleLinks.push(link);
          }

          const rawCandidates = [
            anchor.getAttribute("title") || "",
            anchor.getAttribute("aria-label") || "",
            anchor.textContent || "",
            ...Array.from(anchor.querySelectorAll("img[alt]"), (img) => img.getAttribute("alt") || "")
          ];

          for (const rawCandidate of rawCandidates) {
            const cleanAnchorHeadline = cleanHeadline(rawCandidate);
            if (!cleanAnchorHeadline) {
              continue;
            }
            const key = canonicalKey(cleanAnchorHeadline);
            if (!key) {
              continue;
            }
            if (!isGroundArticleLink(link)) {
              continue;
            }
            if (!linksByHeadlineKey.has(key) || /\/article\//i.test(link)) {
              linksByHeadlineKey.set(key, link);
            }
          }
        }

        for (const node of candidates) {
          const raw = node.getAttribute("title") || node.textContent || "";
          const headline = cleanHeadline(raw);
          if (!headline) {
            continue;
          }

          const key = canonicalKey(headline);
          if (!key || seen.has(key)) {
            continue;
          }

          const anchor = node.closest("a[href]") || node.querySelector("a[href]");
          const anchorLink = normalizeGroundLink(anchor?.getAttribute("href"));
          let sourceLink =
            (isGroundArticleLink(anchorLink) ? anchorLink : "") ||
            linksByHeadlineKey.get(key) ||
            "";
          if (!sourceLink && fallbackLinkIndex < orderedArticleLinks.length) {
            sourceLink = orderedArticleLinks[fallbackLinkIndex];
            fallbackLinkIndex += 1;
          }

          seen.add(key);
          headlines.push({
            title: headline,
            link: sourceLink
          });

          if (headlines.length >= maxItems) {
            break;
          }
        }

        return headlines;
      }

      function extractHeadlinesFromMarkdown(markdown, maxItems) {
        const lines = markdown.split(/\r?\n/);
        const seen = new Set();
        const headlines = [];
        const linksByHeadlineKey = extractHeadlineLinksFromMarkdown(markdown);

        for (const line of lines) {
          const headingMatch = line.match(/^#{2,4}\s+(.+)/);
          if (!headingMatch) {
            continue;
          }

          let raw = headingMatch[1];
          let sourceLink = "";

          const markdownLinkMatch = raw.match(/\[([^\]]+)\]\((https?:\/\/[^)]+|\/[^)]+)\)/);
          if (markdownLinkMatch) {
            raw = markdownLinkMatch[1];
            sourceLink = normalizeGroundLink(markdownLinkMatch[2]);
            if (!isGroundArticleLink(sourceLink)) {
              sourceLink = "";
            }
          }

          raw = raw.replace(/!\[[^\]]*\]\([^)]*\)/g, "");
          const headline = cleanHeadline(raw);
          if (!headline) {
            continue;
          }

          const key = canonicalKey(headline);
          if (!key || seen.has(key)) {
            continue;
          }

          sourceLink = sourceLink || linksByHeadlineKey.get(key) || "";

          seen.add(key);
          headlines.push({
            title: headline,
            link: sourceLink
          });

          if (headlines.length >= maxItems) {
            break;
          }
        }

        return headlines;
      }

      async function fetchText(url, options = {}) {
        const timeoutMs = Number.isFinite(options.timeoutMs) ? options.timeoutMs : 20000;
        const retries = Number.isFinite(options.retries) ? options.retries : 1;

        let lastError = null;
        for (let attempt = 0; attempt <= retries; attempt += 1) {
          const controller = new AbortController();
          const timeoutId = window.setTimeout(() => controller.abort(), timeoutMs);

          try {
            const response = await fetch(url, {
              signal: controller.signal,
              cache: "no-store"
            });

            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            return response.text();
          } catch (error) {
            lastError = error;
            const isAbort = error?.name === "AbortError" || /aborted/i.test(error?.message || "");
            if (!isAbort || attempt >= retries) {
              break;
            }
          } finally {
            window.clearTimeout(timeoutId);
          }
        }

        if (lastError?.name === "AbortError" || /aborted/i.test(lastError?.message || "")) {
          throw new Error("Request timed out");
        }
        throw lastError || new Error("Request failed");
      }

      async function fetchHeadlines(sourceUrl, maxItems) {
        const tasks = proxyCandidates.map(async (proxy) => {
          const body = await fetchText(proxy.build(sourceUrl), { timeoutMs: 20000, retries: 1 });
          const fromHtml = extractHeadlinesFromHtml(body, maxItems);
          const headlines = fromHtml.length ? fromHtml : extractHeadlinesFromMarkdown(body, maxItems);

          if (!headlines.length) {
            throw new Error(`${proxy.name}: no headlines found`);
          }

          const linkCount = headlines.reduce((count, headline) => (headline.link ? count + 1 : count), 0);
          return { headlines, proxy: proxy.name, linkCount };
        });

        const settled = await Promise.allSettled(tasks);
        const successful = settled
          .filter((result) => result.status === "fulfilled")
          .map((result) => result.value);

        if (successful.length) {
          successful.sort((a, b) => {
            if (b.linkCount !== a.linkCount) {
              return b.linkCount - a.linkCount;
            }
            return b.headlines.length - a.headlines.length;
          });
          return successful[0];
        }

        const failures = settled
          .filter((result) => result.status === "rejected")
          .map((result) => result.reason?.message || String(result.reason));

        throw new Error(failures.join(" | "));
      }

      async function translateText(text, targetLanguage) {
        if (targetLanguage === "en") {
          return text;
        }

        const cacheKey = `${targetLanguage}::${text}`;
        const cached = state.translationCache.get(cacheKey);
        if (cached) {
          return cached;
        }

        const request = (async () => {
          const url = `${translationEndpoint}?client=gtx&sl=en&tl=${encodeURIComponent(targetLanguage)}&dt=t&q=${encodeURIComponent(text)}`;
          const response = await fetch(url, { cache: "no-store" });

          if (!response.ok) {
            throw new Error(`Translate HTTP ${response.status}`);
          }

          const payload = await response.json();
          const translated = Array.isArray(payload?.[0])
            ? payload[0].map((chunk) => chunk?.[0] || "").join("")
            : "";

          return normalizeSpaces(translated) || text;
        })();

        state.translationCache.set(cacheKey, request);
        try {
          return await request;
        } catch (error) {
          state.translationCache.delete(cacheKey);
          throw error;
        }
      }

      function sanitizeArticleText(text) {
        return normalizeSpaces(
          String(text || "")
            .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/gi, "$1")
            .replace(/https?:\/\/\S+/gi, "")
            .replace(/\bImage\s+\d+\s*:\s*/gi, "")
            .replace(/\]\(http[^\s)]*/gi, "")
            .replace(/\s+\|\s+/g, " ")
        );
      }

      function isArticleNoise(text) {
        if (!text) {
          return true;
        }

        if (text.length < 18) {
          return true;
        }

        const noisePatterns = [
          /^opens?\s+in\s+a\s+new\s+window/i,
          /opens?\s+an?\s+external\s+website/i,
          /this website utilizes technologies such as cookies/i,
          /privacy policy/i,
          /cookie(s)?/i,
          /targeted advertising/i,
          /^feed icon/i,
          /^image\s+\d+/i,
          /^subscribe|^sign up|^log in|^accept all/i
        ];

        return noisePatterns.some((pattern) => pattern.test(text));
      }

      function splitIntoSentences(text) {
        const cleaned = sanitizeArticleText(text);
        if (!cleaned) {
          return [];
        }

        if (typeof Intl !== "undefined" && typeof Intl.Segmenter === "function") {
          try {
            const segmenter = new Intl.Segmenter("en", { granularity: "sentence" });
            const segments = Array.from(segmenter.segment(cleaned), (part) => normalizeSpaces(part.segment));
            return segments
              .map((segment) => sanitizeArticleText(segment))
              .filter((segment) => segment.length >= 12 && !isArticleNoise(segment));
          } catch (error) {
            console.warn("Intl.Segmenter sentence split failed:", error);
          }
        }

        return cleaned
          .split(/(?<=[.!?؟])\s+/)
          .map((segment) => sanitizeArticleText(segment))
          .filter((segment) => segment.length >= 12 && !isArticleNoise(segment));
      }

      function extractArticleParagraphsFromHtml(html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        const paragraphNodes = doc.querySelectorAll("article p, main p, p");

        const paragraphs = [];
        for (const node of paragraphNodes) {
          if (node.closest("header, nav, footer, aside, form, button, [role='dialog'], [class*='cookie' i], [id*='cookie' i], [class*='consent' i], [id*='consent' i]")) {
            continue;
          }

          const text = sanitizeArticleText(node.textContent || "");
          if (!text || text.length < 50) {
            continue;
          }
          if (/^copyright|^sign up|^subscribe|^read more/i.test(text) || isArticleNoise(text)) {
            continue;
          }
          paragraphs.push(text);
          if (paragraphs.length >= 24) {
            break;
          }
        }

        return paragraphs;
      }

      function extractArticleParagraphsFromMarkdown(markdown) {
        const lines = markdown.split(/\r?\n/);
        const paragraphs = [];

        for (const line of lines) {
          const text = sanitizeArticleText(line);
          if (!text || text.length < 50) {
            continue;
          }
          if (/^#{1,6}\s/.test(text)) {
            continue;
          }
          if (/^\[.*\]\(https?:\/\/.*\)$/.test(text)) {
            continue;
          }
          if (/^title:|^url source:|^markdown content:/i.test(text)) {
            continue;
          }
          if (/^\*+$/.test(text)) {
            continue;
          }
          if (isArticleNoise(text)) {
            continue;
          }
          paragraphs.push(text);
          if (paragraphs.length >= 24) {
            break;
          }
        }

        return paragraphs;
      }

      async function fetchArticleSentences(sourceUrl, options = {}) {
        const maxSentences = Number.isFinite(options.maxSentences)
          ? Math.max(1, Math.floor(options.maxSentences))
          : MAX_ARTICLE_SENTENCES;

        const articleProxyCandidates = [
          {
            name: "Jina AI Reader",
            build: (url) => `https://r.jina.ai/http://${url.replace(/^https?:\/\//i, "")}`,
            parse: extractArticleParagraphsFromMarkdown
          },
          {
            name: "AllOrigins",
            build: (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            parse: extractArticleParagraphsFromHtml
          }
        ];

        const tasks = articleProxyCandidates.map(async (proxy) => {
          const body = await fetchText(proxy.build(sourceUrl), { timeoutMs: 45000, retries: 1 });
          const paragraphs = proxy.parse(body);
          if (!paragraphs.length) {
            throw new Error(`${proxy.name}: no article paragraphs`);
          }

          const sentenceBucket = [];
          for (const paragraph of paragraphs) {
            for (const sentence of splitIntoSentences(paragraph)) {
              sentenceBucket.push(sentence);
              if (sentenceBucket.length >= maxSentences) {
                return { sentences: sentenceBucket, proxy: proxy.name };
              }
            }
          }

          if (!sentenceBucket.length) {
            throw new Error(`${proxy.name}: no article sentences`);
          }

          return { sentences: sentenceBucket, proxy: proxy.name };
        });

        if (typeof Promise.any === "function") {
          try {
            return await Promise.any(tasks);
          } catch (aggregateError) {
            const reasons = Array.isArray(aggregateError.errors)
              ? aggregateError.errors.map((err) => err?.message || String(err))
              : [aggregateError.message];
            throw new Error(reasons.join(" | "));
          }
        }

        const failures = [];
        for (const task of tasks) {
          try {
            return await task;
          } catch (error) {
            failures.push(error.message);
          }
        }

        throw new Error(failures.join(" | "));
      }

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function normalizeSpeechTargets(targets = []) {
        return Array.isArray(targets)
          ? targets
            .filter((target) => target && target.id)
            .map((target) => ({
              id: String(target.id),
              text: normalizeSpaces(String(target.text || ""))
            }))
          : [];
      }

      function getActiveWordIndex(text, charIndex) {
        if (!Number.isFinite(charIndex) || charIndex < 0) {
          return -1;
        }

        const wordPattern = /\S+/gu;
        let match;
        let index = 0;
        while ((match = wordPattern.exec(text)) !== null) {
          const start = match.index;
          const end = start + match[0].length;
          if (charIndex >= start && charIndex < end) {
            return index;
          }
          index += 1;
        }

        return -1;
      }

      function buildHighlightedTextHtml(text, charIndex) {
        const cleanText = normalizeSpaces(text);
        if (!cleanText) {
          return "";
        }

        const activeWordIndex = getActiveWordIndex(cleanText, charIndex);
        const wordPattern = /\S+/gu;
        let match;
        let html = "";
        let lastIndex = 0;
        let index = 0;

        while ((match = wordPattern.exec(cleanText)) !== null) {
          html += escapeHtml(cleanText.slice(lastIndex, match.index));
          const wordClass = index === activeWordIndex ? "speech-word active" : "speech-word";
          html += `<span class="${wordClass}">${escapeHtml(match[0])}</span>`;
          lastIndex = match.index + match[0].length;
          index += 1;
        }

        html += escapeHtml(cleanText.slice(lastIndex));
        return html;
      }

      function setNowSpeaking(trackerLabel, text, charIndex) {
        const cleanText = normalizeSpaces(text || "");
        if (!cleanText) {
          return;
        }

        nowSpeakingMeta.textContent = trackerLabel || "Now Speaking";
        nowSpeakingText.classList.add("is-speaking");
        nowSpeakingText.innerHTML = buildHighlightedTextHtml(cleanText, charIndex);
        nowSpeakingBox.hidden = false;
        document.body.classList.add("has-now-speaking");
      }

      function clearNowSpeaking() {
        nowSpeakingText.classList.remove("is-speaking");
        nowSpeakingText.textContent = "";
        nowSpeakingMeta.textContent = "";
        nowSpeakingBox.hidden = true;
        document.body.classList.remove("has-now-speaking");
      }

      function applySpeechHighlight(targets, text, charIndex, trackerLabel) {
        const cleanText = normalizeSpaces(text || "");
        if (!cleanText) {
          return;
        }

        const normalizedTargets = normalizeSpeechTargets(targets);
        for (const target of normalizedTargets) {
          const node = document.getElementById(target.id);
          if (!node) {
            continue;
          }
          node.classList.add("is-speaking");
          node.innerHTML = buildHighlightedTextHtml(target.text || cleanText, charIndex);
        }

        setNowSpeaking(trackerLabel, cleanText, charIndex);
        state.activeSpeechVisual = {
          targets: normalizedTargets,
          trackerLabel: trackerLabel || "Now Speaking",
          text: cleanText
        };
      }

      function clearSpeechVisuals() {
        const active = state.activeSpeechVisual;
        if (active?.targets?.length) {
          for (const target of active.targets) {
            const node = document.getElementById(target.id);
            if (!node) {
              continue;
            }
            node.classList.remove("is-speaking");
            node.textContent = target.text || "";
          }
        }

        state.activeSpeechVisual = null;
        clearNowSpeaking();
      }

      function stopAudioPlayback() {
        state.audioPlaybackToken += 1;
        if (state.activeAudio) {
          state.activeAudio.pause();
          state.activeAudio.currentTime = 0;
          state.activeAudio.src = "";
          state.activeAudio = null;
        }
        if (state.activeAudioObjectUrl) {
          URL.revokeObjectURL(state.activeAudioObjectUrl);
          state.activeAudioObjectUrl = "";
        }
      }

      function stopSpeechSynthesis() {
        if (window.speechSynthesis) {
          window.speechSynthesis.cancel();
        }
        state.activeUtterance = null;
      }

      function stopAllSpeech() {
        stopAudioPlayback();
        stopSpeechSynthesis();
        clearSpeechVisuals();
      }

      function splitTtsChunks(text, maxChars = PIPER_FA_CHUNK_MAX) {
        const cleaned = normalizeSpaces(text || "");
        if (!cleaned) {
          return [];
        }
        if (cleaned.length <= maxChars) {
          return [cleaned];
        }

        const sentenceParts = cleaned
          .split(/(?<=[.!?؟،؛:])\s+/)
          .map((part) => normalizeSpaces(part))
          .filter(Boolean);

        const chunks = [];
        let current = "";

        const pushCurrent = () => {
          if (current) {
            chunks.push(current);
            current = "";
          }
        };

        for (const part of sentenceParts.length ? sentenceParts : [cleaned]) {
          if (part.length > maxChars) {
            pushCurrent();
            const words = part.split(/\s+/).filter(Boolean);
            let longChunk = "";
            for (const word of words) {
              const candidate = longChunk ? `${longChunk} ${word}` : word;
              if (candidate.length <= maxChars) {
                longChunk = candidate;
              } else {
                if (longChunk) {
                  chunks.push(longChunk);
                }
                longChunk = word;
              }
            }
            if (longChunk) {
              chunks.push(longChunk);
            }
            continue;
          }

          const candidate = current ? `${current} ${part}` : part;
          if (candidate.length <= maxChars) {
            current = candidate;
          } else {
            pushCurrent();
            current = part;
          }
        }
        pushCurrent();
        return chunks.filter(Boolean);
      }

      function playObjectUrlAudio(objectUrl, options = {}) {
        const {
          highlightTargets = [],
          highlightText = "",
          charIndex = 0,
          trackerLabel = ""
        } = options;
        const playbackToken = state.audioPlaybackToken;

        return new Promise((resolve, reject) => {
          const audio = new Audio();
          state.activeAudio = audio;
          state.activeAudioObjectUrl = objectUrl;
          audio.src = objectUrl;
          audio.preload = "auto";
          const wasCanceled = () => playbackToken !== state.audioPlaybackToken;

          const finish = (cb, value) => {
            audio.onended = null;
            audio.onerror = null;
            audio.onabort = null;
            if (state.activeAudio === audio) {
              state.activeAudio = null;
            }
            if (state.activeAudioObjectUrl === objectUrl) {
              URL.revokeObjectURL(objectUrl);
              state.activeAudioObjectUrl = "";
            }
            cb(value);
          };

          audio.onended = () => {
            clearSpeechVisuals();
            finish(resolve);
          };

          audio.onabort = () => {
            if (wasCanceled()) {
              clearSpeechVisuals();
              finish(resolve);
              return;
            }
            finish(reject, new Error("Audio playback aborted."));
          };
          audio.onerror = () => {
            if (wasCanceled()) {
              clearSpeechVisuals();
              finish(resolve);
              return;
            }
            finish(reject, new Error("Audio playback failed."));
          };

          applySpeechHighlight(
            highlightTargets,
            highlightText,
            Math.max(0, charIndex),
            trackerLabel
          );

          audio.play().catch((error) => {
            if (wasCanceled()) {
              clearSpeechVisuals();
              finish(resolve);
              return;
            }
            finish(reject, error);
          });

          if (wasCanceled()) {
            audio.pause();
            clearSpeechVisuals();
            finish(resolve);
          }
        });
      }

      async function ensurePiperPersianReady() {
        if (state.piperReady && state.piperModule) {
          return;
        }

        if (state.piperLoading) {
          for (let i = 0; i < 60; i += 1) {
            if (state.piperReady && state.piperModule) {
              return;
            }
            await new Promise((resolve) => window.setTimeout(resolve, 150));
          }
        }

        state.piperLoading = true;
        try {
          const mod = await import(PIPER_ESM_URL);
          if (!mod || typeof mod.predict !== "function") {
            throw new Error("Piper module load failed.");
          }

          state.piperModule = mod;

          // Warm up + cache model assets in OPFS on first use.
          await mod.download(state.piperVoiceId);
          state.piperReady = true;
        } catch (error) {
          state.piperReady = false;
          state.piperModule = null;
          throw error;
        } finally {
          state.piperLoading = false;
        }
      }

      async function speakWithPiperPersian(text, options = {}) {
        const cleanText = normalizeSpaces(text || "");
        if (!cleanText) {
          return;
        }

        const visualTargets = normalizeSpeechTargets(options.highlightTargets || []);
        const trackerLabel = options.trackerLabel || "Persian (Piper)";
        const chunkList = splitTtsChunks(cleanText);
        if (!chunkList.length) {
          return;
        }

        await ensurePiperPersianReady();

        const playbackToken = state.audioPlaybackToken;
        let charCursor = 0;

        for (let index = 0; index < chunkList.length; index += 1) {
          if (playbackToken !== state.audioPlaybackToken) {
            clearSpeechVisuals();
            return;
          }
          const chunk = chunkList[index];

          const wavBlob = await state.piperModule.predict({
            text: chunk,
            voiceId: state.piperVoiceId
          });

          const objectUrl = URL.createObjectURL(wavBlob);
          await playObjectUrlAudio(objectUrl, {
            highlightTargets: visualTargets,
            highlightText: cleanText,
            charIndex: charCursor,
            trackerLabel
          });

          const foundAt = cleanText.indexOf(chunk, charCursor);
          charCursor = (foundAt >= 0 ? foundAt : charCursor) + chunk.length;
        }
      }

      function findVoiceForLang(languageCode) {
        const code = languageCode.toLowerCase();
        const exact = state.voices.find((voice) => voice.lang?.toLowerCase() === code);
        if (exact) {
          return exact;
        }

        const prefix = code.split("-")[0];
        const byPrefix = state.voices.find((voice) => voice.lang?.toLowerCase().startsWith(prefix));
        if (byPrefix) {
          return byPrefix;
        }

        if (prefix === "fa" || prefix === "prs") {
          return state.voices.find((voice) => {
            const lang = voice.lang?.toLowerCase() || "";
            const name = voice.name?.toLowerCase() || "";
            return (
              lang.startsWith("fa") ||
              lang.startsWith("prs") ||
              /farsi|persian|dari|afghan|فارسی|پارسی|دری/.test(name)
            );
          });
        }

        return null;
      }

      function findBestVoiceForLang(languageCode) {
        const code = languageCode.toLowerCase();
        const prefix = code.split("-")[0];

        const candidates = state.voices.filter((voice) => {
          const lang = voice.lang?.toLowerCase() || "";
          if (!lang) {
            return false;
          }
          return lang === code || lang.startsWith(prefix);
        });

        if (!candidates.length) {
          return null;
        }

        return (
          candidates.find((voice) => voice.default && voice.localService) ||
          candidates.find((voice) => voice.localService) ||
          candidates.find((voice) => voice.default) ||
          candidates[0]
        );
      }

      function normalizeLangForDevice(languageCode) {
        const raw = String(languageCode || "").trim();
        if (!raw) {
          return raw;
        }

        if (!state.isIOS) {
          return raw;
        }

        const normalized = raw.toLowerCase();
        const prefix = normalized.split("-")[0];
        if (prefix === "fa" || prefix === "prs") {
          return "fa-IR";
        }
        if (prefix === "ru") {
          return "ru-RU";
        }
        if (prefix === "en") {
          return "en-US";
        }
        return raw;
      }

      function findIOSDefaultVoiceForLang(languageCode) {
        const code = normalizeLangForDevice(languageCode).toLowerCase();
        const prefix = code.split("-")[0];
        const candidates = state.voices.filter((voice) => {
          const lang = (voice.lang || "").toLowerCase();
          const name = (voice.name || "").toLowerCase();
          if (!lang && prefix !== "fa" && prefix !== "prs") {
            return false;
          }

          if (prefix === "fa" || prefix === "prs") {
            return (
              lang.startsWith("fa") ||
              lang.startsWith("prs") ||
              /farsi|persian|فارسی|پارسی/.test(name)
            );
          }

          return lang === code || lang.startsWith(prefix);
        });

        if (!candidates.length) {
          return null;
        }

        return (
          candidates.find((voice) => /dariush|داریوش/i.test(`${voice.name || ""} ${voice.voiceURI || ""}`)) ||
          candidates.find((voice) => voice.default) ||
          candidates.find((voice) => voice.localService) ||
          candidates[0]
        );
      }

      function findPreferredVoiceForLang(languageCode) {
        const code = normalizeLangForDevice(languageCode).toLowerCase();
        const prefix = code.split("-")[0];
        const candidates = state.voices.filter((voice) => {
          const lang = voice.lang?.toLowerCase() || "";
          return lang === code || lang.startsWith(prefix);
        });

        if (!candidates.length) {
          return null;
        }

        if (state.isIOS) {
          return findIOSDefaultVoiceForLang(code) || findBestVoiceForLang(code);
        }

        const weightedMatchers = {
          ru: [
            /\byuri\b/i,
            /ru-ru.*yuri|yuri.*ru-ru/i,
            /com\.apple\..*yuri/i,
            /microsoft\s+irina/i,
            /enhanced/i,
            /russian/i,
            /рус/i
          ],
          en: [
            /\bjamie\b/i,
            /premium/i,
            /com\.apple\..*jamie/i,
            /alex|samantha|ava|allison|daniel|karen|moira|victoria|enhanced/i
          ],
          fa: [
            /farsi|persian|iran|fa-?ir|فارسی|پارسی/i,
            /dari|afghan|دری/i
          ]
        };

        const matchers = weightedMatchers[prefix] || [];
        for (const matcher of matchers) {
          const matched = candidates.find((voice) => {
            const label = `${voice.name || ""} ${voice.voiceURI || ""}`.toLowerCase();
            return matcher.test(label);
          });
          if (matched) {
            return matched;
          }
        }

        return (
          candidates.find((voice) => voice.default && voice.localService) ||
          candidates.find((voice) => voice.localService) ||
          candidates.find((voice) => voice.default) ||
          candidates[0]
        );
      }

      function hasVoiceForLang(languageCode) {
        return Boolean(findVoiceForLang(languageCode));
      }

      async function refreshVoices() {
        if (!window.speechSynthesis) {
          return;
        }

        let voices = window.speechSynthesis.getVoices();
        if (voices.length) {
          state.voices = voices;
          return;
        }

        for (let attempt = 0; attempt < 10; attempt += 1) {
          await new Promise((resolve) => window.setTimeout(resolve, 120));
          voices = window.speechSynthesis.getVoices();
          if (voices.length) {
            state.voices = voices;
            return;
          }
        }
      }

      async function speakWithSpeechSynthesis(text, lang, options = {}) {
        if (!window.speechSynthesis || typeof SpeechSynthesisUtterance === "undefined") {
          throw new Error("Speech synthesis is unavailable");
        }

        const {
          forceMatchedVoice = false,
          awaitEnd = false,
          highlightTargets = [],
          trackerLabel = ""
        } = options;

        await new Promise((resolve, reject) => {
          const spokenText = normalizeSpaces(text || "");
          const visualTargets = normalizeSpeechTargets(highlightTargets);
          const requestedLang = normalizeLangForDevice(lang);
          const requestedPrefix = requestedLang.toLowerCase().split("-")[0];
          const utterance = new SpeechSynthesisUtterance(spokenText);
          utterance.lang = requestedLang;

          let preferredVoice = null;
          if (state.isIOS) {
            preferredVoice = findIOSDefaultVoiceForLang(requestedLang);
          } else if (state.isSafari) {
            preferredVoice = findBestVoiceForLang(requestedLang) || findVoiceForLang(requestedLang) || findPreferredVoiceForLang(requestedLang);
          } else {
            preferredVoice = forceMatchedVoice
              ? (findPreferredVoiceForLang(requestedLang) || findBestVoiceForLang(requestedLang) || findVoiceForLang(requestedLang))
              : (findPreferredVoiceForLang(requestedLang) || findBestVoiceForLang(requestedLang));
          }

          // On iPhone, do not silently fall back Persian text to an Arabic/default voice.
          if (state.isIOS && (requestedPrefix === "fa" || requestedPrefix === "prs") && !preferredVoice) {
            reject(new Error("No iPhone Persian web voice is exposed. iOS is falling back to non-Persian voices."));
            return;
          }

          if (preferredVoice && (state.isIOS || forceMatchedVoice || preferredVoice.localService || state.isSafari)) {
            utterance.voice = preferredVoice;
            if (preferredVoice.lang) {
              utterance.lang = preferredVoice.lang;
            }
            console.debug("Selected speech voice:", {
              requestedLang,
              name: preferredVoice.name,
              voiceURI: preferredVoice.voiceURI,
              lang: preferredVoice.lang,
              localService: preferredVoice.localService,
              default: preferredVoice.default
            });
          }

          let started = false;
          let resolved = false;

          const finish = (cb, payload) => {
            if (resolved) {
              return;
            }
            resolved = true;
            cb(payload);
          };

          const timeoutId = window.setTimeout(() => {
            if (!started) {
              window.speechSynthesis.cancel();
              finish(reject, new Error("Speech synthesis did not start"));
            }
          }, 4000);

          utterance.onstart = () => {
            started = true;
            applySpeechHighlight(visualTargets, spokenText, 0, trackerLabel);
            if (!awaitEnd) {
              window.clearTimeout(timeoutId);
              finish(resolve);
            }
          };

          utterance.onboundary = (event) => {
            if (!started) {
              return;
            }
            if (!Number.isFinite(event.charIndex)) {
              return;
            }
            applySpeechHighlight(visualTargets, spokenText, event.charIndex, trackerLabel);
          };

          utterance.onend = () => {
            window.clearTimeout(timeoutId);
            clearSpeechVisuals();
            finish(resolve);
          };

          utterance.onerror = (event) => {
            window.clearTimeout(timeoutId);
            clearSpeechVisuals();
            finish(reject, new Error(event.error || "Speech synthesis error"));
          };

          state.activeUtterance = utterance;
          if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
            window.speechSynthesis.cancel();
          }
          window.speechSynthesis.speak(utterance);
          if (window.speechSynthesis.paused) {
            window.speechSynthesis.resume();
          }
        });
      }

      async function speakWithPreferredLangs(text, languageCodes, options = {}) {
        const wantsPersian = (languageCodes || []).some((code) => {
          const normalized = String(code || "").toLowerCase();
          return normalized.startsWith("fa") || normalized.startsWith("prs");
        });

        if (state.isIOS) {
          const iosLang = normalizeLangForDevice(languageCodes?.[0] || "fa-IR");
          try {
            await speakWithSpeechSynthesis(text, iosLang, {
              forceMatchedVoice: false,
              awaitEnd: Boolean(options.awaitEnd),
              highlightTargets: options.highlightTargets || [],
              trackerLabel: options.trackerLabel || ""
            });
            return;
          } catch (error) {
            if (!wantsPersian) {
              throw error;
            }
            console.warn("iOS Persian system voice unavailable, using Piper fallback:", error);
          }
        }

        const available = languageCodes.find((code) => hasVoiceForLang(code));
        if (available) {
          await speakWithSpeechSynthesis(text, available, {
            forceMatchedVoice: true,
            awaitEnd: Boolean(options.awaitEnd),
            highlightTargets: options.highlightTargets || [],
            trackerLabel: options.trackerLabel || ""
          });
          return;
        }

        if (wantsPersian) {
          await speakWithPiperPersian(text, {
            highlightTargets: options.highlightTargets || [],
            trackerLabel: options.trackerLabel || "Farsi"
          });
          return;
        }

        throw new Error("No matching voice found on this device/browser.");
      }

      async function speakText(text, langTag, options = {}) {
        const lang = normalizeLangForDevice(String(langTag || "").toLowerCase());
        const baseLang = lang.split("-")[0];

        if (!text) {
          return;
        }

        await refreshVoices();
        stopAllSpeech();

        if (state.isIOS) {
          try {
            await speakWithSpeechSynthesis(text, lang, {
              forceMatchedVoice: false,
              awaitEnd: true,
              highlightTargets: options.highlightTargets || [],
              trackerLabel: options.trackerLabel || lang.toUpperCase()
            });
            return;
          } catch (error) {
            console.warn("iOS speech fallback failed:", error);
          }
        }

        if (baseLang === "fa") {
          await speakWithPreferredLangs(text, ["fa-IR", "fa", "prs-AF", "prs", "fa-AF"], {
            awaitEnd: true,
            highlightTargets: options.highlightTargets || [],
            trackerLabel: options.trackerLabel || "Farsi"
          });
          return;
        }

        try {
          await speakWithSpeechSynthesis(text, lang, {
            forceMatchedVoice: true,
            awaitEnd: true,
            highlightTargets: options.highlightTargets || [],
            trackerLabel: options.trackerLabel || lang.toUpperCase()
          });
          return;
        } catch (error) {
          console.warn("SpeechSynthesis failed:", error);
        }
        throw new Error(`No usable system voice for ${baseLang}.`);
      }

      function getArticleRecord(headlineIndex) {
        if (!state.articleData.has(headlineIndex)) {
          state.articleData.set(headlineIndex, {
            loading: false,
            loaded: false,
            sentences: [],
            currentSentenceIndex: 0,
            playing: false,
            status: "Not loaded.",
            bookAllSentences: null,
            bookNextIndex: 0
          });
        }
        return state.articleData.get(headlineIndex);
      }

      function setArticleStatus(headlineIndex, message) {
        const statusNode = document.getElementById(`article-status-${headlineIndex}`);
        if (statusNode) {
          statusNode.textContent = message;
        }
        const record = getArticleRecord(headlineIndex);
        record.status = message;
      }

      function renderSentenceList(headlineIndex) {
        const record = getArticleRecord(headlineIndex);
        const listNode = document.getElementById(`sentence-list-${headlineIndex}`);
        if (!listNode) {
          return;
        }
        if (!record.sentences.length) {
          listNode.innerHTML = "";
          return;
        }

        listNode.innerHTML = record.sentences.map((sentence, sentenceIndex) => {
          const activeClass = sentenceIndex === record.currentSentenceIndex ? "active" : "";
          return `
            <article class="sentence-row ${activeClass}" data-sentence-index="${sentenceIndex}">
              <div class="sentence-row-head">
                <button class="sentence-index-btn" type="button" data-action="select-sentence" data-headline-index="${headlineIndex}" data-sentence-index="${sentenceIndex}">Sentence ${sentenceIndex + 1}</button>
                <button class="sentence-index-btn" type="button" data-action="play-sentence-trio" data-headline-index="${headlineIndex}" data-sentence-index="${sentenceIndex}">Play EN→FA→RU</button>
              </div>
              <p class="sentence-lang" lang="en"><span class="sentence-prefix">EN:</span><span class="sentence-text" id="sentence-text-${headlineIndex}-${sentenceIndex}-en" lang="en">${escapeHtml(sentence.en)}</span></p>
              <p class="sentence-lang fa" lang="fa-IR" dir="rtl"><span class="sentence-prefix">FA:</span><span class="sentence-text fa" id="sentence-text-${headlineIndex}-${sentenceIndex}-fa" lang="fa-IR" dir="rtl">${escapeHtml(sentence.fa)}</span></p>
              <p class="sentence-lang" lang="ru-RU"><span class="sentence-prefix">RU:</span><span class="sentence-text" id="sentence-text-${headlineIndex}-${sentenceIndex}-ru" lang="ru-RU">${escapeHtml(sentence.ru)}</span></p>
            </article>
          `;
        }).join("");
      }

      async function loadMoreBookSentences(headlineIndex) {
        const headline = state.translatedHeadlines[headlineIndex];
        if (!headline || !headline.source) {
          throw new Error("No source link for this book.");
        }

        const record = getArticleRecord(headlineIndex);
        if (record.loading) {
          return;
        }

        record.loading = true;
        try {
          if (!Array.isArray(record.bookAllSentences) || !record.bookAllSentences.length) {
            setArticleStatus(headlineIndex, "Loading book text pool...");
            const sourceCandidates = getSourceCandidates(headline.source);
            let fetched = null;
            let lastError = null;
            for (const candidate of sourceCandidates) {
              try {
                fetched = await fetchArticleSentences(candidate, { maxSentences: MAX_BOOK_SENTENCE_POOL });
                headline.source = candidate;
                break;
              } catch (error) {
                lastError = error;
              }
            }

            if (!fetched) {
              throw lastError || new Error("Failed to read book text.");
            }

            record.bookAllSentences = fetched.sentences;
            record.bookNextIndex = 0;
            setArticleStatus(headlineIndex, `Book pool ready (${record.bookAllSentences.length} sentences).`);
          }

          if (record.bookNextIndex >= record.bookAllSentences.length) {
            setArticleStatus(headlineIndex, "No more sentences left in this book extract.");
            return;
          }

          const nextChunk = record.bookAllSentences.slice(
            record.bookNextIndex,
            record.bookNextIndex + BOOK_BATCH_SIZE
          );

          setArticleStatus(
            headlineIndex,
            `Translating more sentences (${record.bookNextIndex + 1}-${record.bookNextIndex + nextChunk.length})...`
          );

          const [faSentences, ruSentences] = await Promise.all([
            Promise.all(nextChunk.map((sentence) => translateText(sentence, "fa"))),
            Promise.all(nextChunk.map((sentence) => translateText(sentence, "ru")))
          ]);

          const mapped = nextChunk.map((sentence, index) => ({
            en: sentence,
            fa: faSentences[index],
            ru: ruSentences[index]
          }));

          record.sentences.push(...mapped);
          record.bookNextIndex += nextChunk.length;
          record.loaded = true;
          if (!record.sentences.length) {
            record.currentSentenceIndex = 0;
          } else {
            record.currentSentenceIndex = Math.min(record.currentSentenceIndex, record.sentences.length - 1);
          }

          renderSentenceList(headlineIndex);
          setArticleStatus(
            headlineIndex,
            `Loaded ${record.sentences.length}/${record.bookAllSentences.length} sentences.`
          );
        } finally {
          record.loading = false;
        }
      }

      async function loadArticleTranslations(headlineIndex) {
        if (state.contentMode === "book") {
          await loadMoreBookSentences(headlineIndex);
          return;
        }

        const headline = state.translatedHeadlines[headlineIndex];
        if (!headline || !headline.source) {
          throw new Error("No source link for this entry.");
        }

        const record = getArticleRecord(headlineIndex);
        if (record.loading) {
          return;
        }
        if (record.loaded && record.sentences.length) {
          return;
        }

        record.loading = true;
        setArticleStatus(
          headlineIndex,
          state.contentMode === "book" ? "Loading book text..." : "Loading article text..."
        );

        try {
          const sourceCandidates = getSourceCandidates(headline.source);
          let fetched = null;
          let lastError = null;
          for (const candidate of sourceCandidates) {
            try {
              fetched = await fetchArticleSentences(candidate);
              headline.source = candidate;
              break;
            } catch (error) {
              lastError = error;
            }
          }

          if (!fetched) {
            throw lastError || new Error("Failed to read source text.");
          }

          const { sentences, proxy } = fetched;
          setArticleStatus(headlineIndex, `Loaded ${sentences.length} sentences via ${proxy}. Translating...`);

          const [faSentences, ruSentences] = await Promise.all([
            Promise.all(sentences.map((sentence) => translateText(sentence, "fa"))),
            Promise.all(sentences.map((sentence) => translateText(sentence, "ru")))
          ]);

          record.sentences = sentences.map((sentence, sentenceIndex) => ({
            en: sentence,
            fa: faSentences[sentenceIndex],
            ru: ruSentences[sentenceIndex]
          }));
          record.currentSentenceIndex = 0;
          record.loaded = true;
          setArticleStatus(headlineIndex, `Ready: ${record.sentences.length} translated sentences.`);
          renderSentenceList(headlineIndex);
        } finally {
          record.loading = false;
        }
      }

      function stopArticlePlayback() {
        state.playbackToken += 1;
        state.playbackMode = "none";
        state.headlinePlayback.active = false;
        state.globalPlayback.active = false;
        for (const [, record] of state.articleData) {
          record.playing = false;
        }
        stopAllSpeech();
        updatePlaybackButtons();
      }

      function setHeadlinePlaybackCursor(headlineIndex, langStep) {
        state.headlinePlayback.headlineIndex = Math.max(0, headlineIndex);
        state.headlinePlayback.langStep = Math.max(0, langStep);
      }

      function setGlobalPlaybackCursor(headlineIndex, sentenceIndex) {
        state.globalPlayback.headlineIndex = Math.max(0, headlineIndex);
        state.globalPlayback.sentenceIndex = Math.max(0, sentenceIndex);
      }

      async function speakSentenceTrio(headlineIndex, sentenceIndex) {
        const record = getArticleRecord(headlineIndex);
        if (!record.loaded || !record.sentences[sentenceIndex]) {
          throw new Error("Load article translations first.");
        }

        await refreshVoices();
        record.currentSentenceIndex = sentenceIndex;
        renderSentenceList(headlineIndex);

        const sentence = record.sentences[sentenceIndex];
        await speakWithSpeechSynthesis(sentence.en, "en-US", {
          forceMatchedVoice: true,
          awaitEnd: true,
          highlightTargets: [{ id: `sentence-text-${headlineIndex}-${sentenceIndex}-en`, text: sentence.en }],
          trackerLabel: `Article ${headlineIndex + 1} Sentence ${sentenceIndex + 1} EN`
        });
        await speakWithPreferredLangs(sentence.fa, ["fa-IR", "fa", "prs-AF", "prs", "fa-AF"], {
          awaitEnd: true,
          highlightTargets: [{ id: `sentence-text-${headlineIndex}-${sentenceIndex}-fa`, text: sentence.fa }],
          trackerLabel: `Article ${headlineIndex + 1} Sentence ${sentenceIndex + 1} FA`
        });
        await speakWithSpeechSynthesis(sentence.ru, "ru-RU", {
          forceMatchedVoice: true,
          awaitEnd: true,
          highlightTargets: [{ id: `sentence-text-${headlineIndex}-${sentenceIndex}-ru`, text: sentence.ru }],
          trackerLabel: `Article ${headlineIndex + 1} Sentence ${sentenceIndex + 1} RU`
        });
      }

      async function playAllSentences(headlineIndex) {
        const record = getArticleRecord(headlineIndex);
        if (!record.loaded || !record.sentences.length) {
          throw new Error("Load article translations first.");
        }

        stopArticlePlayback();
        const token = state.playbackToken;
        record.playing = true;

        try {
          for (let i = record.currentSentenceIndex; i < record.sentences.length; i += 1) {
            if (token !== state.playbackToken) {
              break;
            }
            record.currentSentenceIndex = i;
            renderSentenceList(headlineIndex);
            try {
              await speakSentenceTrio(headlineIndex, i);
            } catch (error) {
              if (token !== state.playbackToken) {
                break;
              }
              throw error;
            }
          }
        } finally {
          if (token === state.playbackToken) {
            record.playing = false;
          }
        }
      }

      async function playAllHeadlines() {
        if (!state.translatedHeadlines.length) {
          throw new Error("No headlines loaded.");
        }

        if (state.headlinePlayback.headlineIndex >= state.translatedHeadlines.length) {
          resetHeadlinePlaybackPosition();
        }

        stopArticlePlayback();
        const token = state.playbackToken;
        state.playbackMode = "headlines";
        state.headlinePlayback.active = true;
        updatePlaybackButtons();
        let finishedAll = true;

        try {
          for (let h = state.headlinePlayback.headlineIndex; h < state.translatedHeadlines.length; h += 1) {
            if (token !== state.playbackToken) {
              finishedAll = false;
              break;
            }

            const headline = state.translatedHeadlines[h];
            const parts = [
              { key: "en", lang: "en-US", text: headline.en, label: `Headline ${h + 1} EN` },
              { key: "fa", lang: "fa-IR", text: headline.fa, label: `Headline ${h + 1} FA` },
              { key: "ru", lang: "ru-RU", text: headline.ru, label: `Headline ${h + 1} RU` }
            ];

            let startStep = 0;
            if (h === state.headlinePlayback.headlineIndex) {
              startStep = Math.min(Math.max(state.headlinePlayback.langStep, 0), parts.length - 1);
            }

            for (let step = startStep; step < parts.length; step += 1) {
              if (token !== state.playbackToken) {
                finishedAll = false;
                break;
              }

              const part = parts[step];
              setHeadlinePlaybackCursor(h, step);
              setStatus(`Reading headline ${h + 1}/${state.translatedHeadlines.length}, ${part.key.toUpperCase()}...`, "");

              const highlightTarget = { id: `headline-text-${h}-${part.key}`, text: part.text };
              if (part.key === "fa") {
                await speakWithPreferredLangs(part.text, ["fa-IR", "fa", "prs-AF", "prs", "fa-AF"], {
                  awaitEnd: true,
                  highlightTargets: [highlightTarget],
                  trackerLabel: part.label
                });
              } else {
                await speakWithSpeechSynthesis(part.text, part.lang, {
                  forceMatchedVoice: true,
                  awaitEnd: true,
                  highlightTargets: [highlightTarget],
                  trackerLabel: part.label
                });
              }
            }

            if (!finishedAll) {
              break;
            }
            setHeadlinePlaybackCursor(h + 1, 0);
          }
        } finally {
          if (token === state.playbackToken) {
            state.headlinePlayback.active = false;
            state.playbackMode = "none";
            updatePlaybackButtons();
          }
        }

        if (finishedAll && state.headlinePlayback.headlineIndex >= state.translatedHeadlines.length) {
          setStatus("Finished all loaded headlines.", "ok");
          resetHeadlinePlaybackPosition();
        } else if (!finishedAll) {
          setStatus(getHeadlinePauseLabel(), "");
        }
      }

      async function playAllArticles() {
        if (!state.translatedHeadlines.length) {
          throw new Error("No headlines loaded.");
        }

        if (state.globalPlayback.headlineIndex >= state.translatedHeadlines.length) {
          resetGlobalPlaybackPosition();
        }

        stopArticlePlayback();
        const token = state.playbackToken;
        state.playbackMode = "articles";
        state.globalPlayback.active = true;
        updatePlaybackButtons();
        let finishedAll = true;

        try {
          for (let h = state.globalPlayback.headlineIndex; h < state.translatedHeadlines.length; h += 1) {
            if (token !== state.playbackToken) {
              finishedAll = false;
              break;
            }

            const record = getArticleRecord(h);
            const panel = document.getElementById(`article-panel-${h}`);
            if (panel) {
              panel.hidden = false;
            }
            if (!record.loaded) {
              setStatus(
                state.contentMode === "book"
                  ? "Loading book sentences..."
                  : `Loading article ${h + 1}/${state.translatedHeadlines.length}...`,
                ""
              );
              try {
                await loadArticleTranslations(h);
