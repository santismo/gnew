              } catch (error) {
                setArticleStatus(h, `Load failed: ${error.message}`);
                setGlobalPlaybackCursor(h + 1, 0);
                continue;
              }
            }

            if (!record.sentences.length) {
              setGlobalPlaybackCursor(h + 1, 0);
              continue;
            }

            let startSentence = 0;
            if (h === state.globalPlayback.headlineIndex) {
              startSentence = Math.min(
                Math.max(state.globalPlayback.sentenceIndex, 0),
                record.sentences.length - 1
              );
            }

            for (let s = startSentence; s < record.sentences.length; s += 1) {
              if (token !== state.playbackToken) {
                finishedAll = false;
                break;
              }
              setGlobalPlaybackCursor(h, s);
              setStatus(
                state.contentMode === "book"
                  ? `Playing sentence ${s + 1}...`
                  : `Playing article ${h + 1}, sentence ${s + 1}...`,
                ""
              );
              try {
                await speakSentenceTrio(h, s);
              } catch (error) {
                if (token !== state.playbackToken) {
                  finishedAll = false;
                  break;
                }
                throw error;
              }
            }

            if (!finishedAll) {
              break;
            }

            setGlobalPlaybackCursor(h + 1, 0);
          }
        } finally {
          if (token === state.playbackToken) {
            state.globalPlayback.active = false;
            state.playbackMode = "none";
            updatePlaybackButtons();
          }
        }

        if (finishedAll && state.globalPlayback.headlineIndex >= state.translatedHeadlines.length) {
          setStatus(
            state.contentMode === "book" ? "Finished book sentences." : "Finished all loaded articles.",
            "ok"
          );
          resetGlobalPlaybackPosition();
        } else if (!finishedAll) {
          setStatus(getGlobalPauseLabel(), "");
        }
      }

      function renderCards(translatedHeadlines) {
        state.contentMode = "news";
        state.translatedHeadlines = translatedHeadlines;
        state.articleData = new Map();

        cardsEl.innerHTML = translatedHeadlines.map((item, index) => {
          const english = escapeHtml(item.en);
          const persian = escapeHtml(item.fa);
          const russian = escapeHtml(item.ru);
          const source = item.source ? escapeHtml(item.source) : "";
          const sourceLink = source
            ? `<a class="source-link" href="${source}" target="_blank" rel="noopener noreferrer">Source</a>`
            : `<span class="source-link">No source link</span>`;

          return `
            <article class="card">
              <div class="card-head">
                <span>Headline ${index + 1}</span>
                <div class="card-head-right">
                  ${sourceLink}
                  <button class="sentence-index-btn" type="button" data-action="toggle-article-panel" data-headline-index="${index}">Options</button>
                </div>
              </div>

              <section class="lang-block">
                <div class="lang-row">
                  <span class="lang-name">English</span>
                  <button class="speak-btn" type="button" data-speak-key="headline-${index}-en" data-speak-lang="en-US" data-speak-text="${english}" data-highlight-target="headline-text-${index}-en" data-tracker-label="Headline ${index + 1} EN">Speak EN</button>
                </div>
                <p class="lang-text" id="headline-text-${index}-en" lang="en">${english}</p>
              </section>

              <section class="lang-block">
                <div class="lang-row">
                  <span class="lang-name">Farsi / Persian</span>
                  <button class="speak-btn" type="button" data-speak-key="headline-${index}-fa" data-speak-lang="fa-IR" data-speak-text="${persian}" data-highlight-target="headline-text-${index}-fa" data-tracker-label="Headline ${index + 1} FA">Speak FA</button>
                </div>
                <p class="lang-text fa" id="headline-text-${index}-fa" lang="fa-IR" dir="rtl">${persian}</p>
              </section>

              <section class="lang-block">
                <div class="lang-row">
                  <span class="lang-name">Russian</span>
                  <button class="speak-btn" type="button" data-speak-key="headline-${index}-ru" data-speak-lang="ru-RU" data-speak-text="${russian}" data-highlight-target="headline-text-${index}-ru" data-tracker-label="Headline ${index + 1} RU">Speak RU</button>
                </div>
                <p class="lang-text" id="headline-text-${index}-ru" lang="ru-RU">${russian}</p>
              </section>

              <section class="article-panel" id="article-panel-${index}" hidden>
                <div class="article-actions">
                  <button class="sentence-index-btn" type="button" data-action="load-article" data-headline-index="${index}">Load Article Translations</button>
                  <button class="sentence-index-btn" type="button" data-action="play-all-sentences" data-headline-index="${index}">Play All</button>
                  <button class="sentence-index-btn" type="button" data-action="stop-all-sentences" data-headline-index="${index}">Stop</button>
                  <button class="sentence-index-btn" type="button" data-action="prev-sentence" data-headline-index="${index}">Prev</button>
                  <button class="sentence-index-btn" type="button" data-action="next-sentence" data-headline-index="${index}">Next</button>
                </div>
                <p class="article-status" id="article-status-${index}">Not loaded.</p>
                <div class="sentence-list" id="sentence-list-${index}"></div>
              </section>
            </article>
          `;
        }).join("");

        updatePlaybackButtons();
      }

      function renderBookStackedCard(book) {
        state.contentMode = "book";
        state.translatedHeadlines = [book];
        state.articleData = new Map();

        const english = escapeHtml(book.en || "");
        const persian = escapeHtml(book.fa || "");
        const russian = escapeHtml(book.ru || "");
        const source = book.source ? escapeHtml(book.source) : "";
        const sourceLink = source
          ? `<a class="source-link" href="${source}" target="_blank" rel="noopener noreferrer">Source</a>`
          : `<span class="source-link">No source link</span>`;

        cardsEl.innerHTML = `
          <article class="card">
            <div class="card-head">
              <span>Random Book</span>
              <div class="card-head-right">${sourceLink}</div>
            </div>
            <p class="book-meta">Title (EN/FA/RU)</p>
            <p class="book-title" id="headline-text-0-en" lang="en">${english}</p>
            <p class="book-title fa" id="headline-text-0-fa" lang="fa-IR" dir="rtl">${persian}</p>
            <p class="book-title" id="headline-text-0-ru" lang="ru-RU">${russian}</p>
            <div class="article-actions" style="margin-top:10px;">
              <button class="sentence-index-btn" type="button" data-action="load-article" data-headline-index="0">Load Book Sentences</button>
              <button class="sentence-index-btn" type="button" data-action="load-more-book" data-headline-index="0">Load More Sentences</button>
              <button class="sentence-index-btn" type="button" data-action="play-all-sentences" data-headline-index="0">Play All</button>
              <button class="sentence-index-btn" type="button" data-action="stop-all-sentences" data-headline-index="0">Stop</button>
              <button class="sentence-index-btn" type="button" data-action="prev-sentence" data-headline-index="0">Prev</button>
              <button class="sentence-index-btn" type="button" data-action="next-sentence" data-headline-index="0">Next</button>
            </div>
            <p class="article-status" id="article-status-0">Not loaded.</p>
            <div class="sentence-list" id="sentence-list-0"></div>
          </article>
        `;

        updatePlaybackButtons();
      }

      function getRequestedCount() {
        const value = Number.parseInt(maxItemsInput.value, 10);
        if (!Number.isFinite(value)) {
          return 8;
        }

        return Math.min(Math.max(value, 1), 25);
      }

      function resetHeadlinePlaybackPosition() {
        state.headlinePlayback.active = false;
        state.headlinePlayback.headlineIndex = 0;
        state.headlinePlayback.langStep = 0;
        updatePlaybackButtons();
      }

      function resetGlobalPlaybackPosition() {
        state.globalPlayback.active = false;
        state.globalPlayback.headlineIndex = 0;
        state.globalPlayback.sentenceIndex = 0;
        updatePlaybackButtons();
      }

      async function runFetchAndTranslate(options = {}) {
        const {
          onlyUnseen = false,
          targetCount = getRequestedCount(),
          markSeen = true
        } = options;

        const sourceUrl = SOURCE_URL;
        const maxItems = Math.min(Math.max(targetCount, 1), 25);
        const fetchPoolSize = onlyUnseen ? Math.min(80, Math.max(maxItems * 8, 32)) : maxItems;

        stopArticlePlayback();
        resetHeadlinePlaybackPosition();
        resetGlobalPlaybackPosition();
        state.currentSpeakKey = "";
        cardsEl.innerHTML = "";
        setStatus("Fetching headlines...", "");

        try {
          const { headlines, proxy } = await fetchHeadlines(sourceUrl, fetchPoolSize);
          const deduped = onlyUnseen
            ? headlines.filter((headline) => !state.seenHeadlineKeys.has(canonicalKey(headline.title)))
            : headlines;
          const selected = deduped.slice(0, maxItems);

          if (!selected.length) {
            setStatus("No unseen headlines found right now. Try again later.", "error");
            return;
          }

          setStatus(`Fetched ${selected.length} headlines via ${proxy}. Translating FA/RU...`, "");

          const [faTranslations, ruTranslations] = await Promise.all([
            Promise.all(selected.map((headline) => translateText(headline.title, "fa"))),
            Promise.all(selected.map((headline) => translateText(headline.title, "ru")))
          ]);

          const translated = selected.map((headline, index) => ({
            en: headline.title,
            fa: faTranslations[index],
            ru: ruTranslations[index],
            source: headline.link
          }));

          if (markSeen) {
            for (const headline of translated) {
              state.seenHeadlineKeys.add(canonicalKey(headline.en));
            }
          }

          resetGlobalPlaybackPosition();
          renderCards(translated);
          setStatus(`Done: ${translated.length} headlines translated.`, "ok");
        } catch (error) {
          setStatus(`Failed: ${error.message}`, "error");
        }
      }

      async function runFetchRandomBook() {
        stopArticlePlayback();
        resetHeadlinePlaybackPosition();
        resetGlobalPlaybackPosition();
        state.currentSpeakKey = "";
        cardsEl.innerHTML = "";
        setStatus("Finding a random Standard Ebooks title...", "");

        try {
          const { book, proxy } = await fetchRandomStandardEbook();
          setStatus(`Selected "${book.title}" via ${proxy}. Translating title...`, "");

          const [faTitle, ruTitle] = await Promise.all([
            translateText(book.title, "fa"),
            translateText(book.title, "ru")
          ]);

          renderBookStackedCard({
            en: book.title,
            fa: faTitle,
            ru: ruTitle,
            source: book.link
          });

          try {
            await loadArticleTranslations(0);
            setStatus(`Loaded random book sentences: ${book.title}`, "ok");
          } catch (error) {
            setArticleStatus(0, `Book text load failed: ${error.message}`);
            setStatus(`Book loaded, but sentence extraction failed: ${error.message}`, "error");
          }
        } catch (error) {
          setStatus(`Random book failed: ${error.message}`, "error");
        }
      }

      cardsEl.addEventListener("click", async (event) => {
        const actionButton = event.target.closest("button[data-action]");
        if (actionButton) {
          const action = actionButton.getAttribute("data-action");
          const headlineIndex = Number.parseInt(actionButton.getAttribute("data-headline-index") || "", 10);
          const sentenceIndex = Number.parseInt(actionButton.getAttribute("data-sentence-index") || "", 10);

          if (!Number.isFinite(headlineIndex)) {
            return;
          }

          const record = getArticleRecord(headlineIndex);

          try {
            if (action === "toggle-article-panel") {
              const panel = document.getElementById(`article-panel-${headlineIndex}`);
              if (panel) {
                panel.hidden = !panel.hidden;
              }
              return;
            }

            if (action === "load-article") {
              await loadArticleTranslations(headlineIndex);
              return;
            }

            if (action === "load-more-book") {
              if (state.contentMode !== "book") {
                setArticleStatus(headlineIndex, "Load more is only available in book mode.");
                return;
              }
              await loadMoreBookSentences(headlineIndex);
              return;
            }

            if (action === "play-all-sentences") {
              if (!record.loaded) {
                await loadArticleTranslations(headlineIndex);
              }
              setArticleStatus(headlineIndex, "Playing all sentences EN → FA → RU...");
              await playAllSentences(headlineIndex);
              setArticleStatus(headlineIndex, `Stopped at sentence ${record.currentSentenceIndex + 1}.`);
              return;
            }

            if (action === "stop-all-sentences") {
              stopArticlePlayback();
              setArticleStatus(headlineIndex, `Stopped at sentence ${record.currentSentenceIndex + 1}.`);
              return;
            }

            if (action === "prev-sentence" || action === "next-sentence") {
              if (!record.loaded || !record.sentences.length) {
                setArticleStatus(headlineIndex, "Load article translations first.");
                return;
              }
              const delta = action === "prev-sentence" ? -1 : 1;
              const nextIndex = Math.min(
                Math.max(record.currentSentenceIndex + delta, 0),
                record.sentences.length - 1
              );
              record.currentSentenceIndex = nextIndex;
              renderSentenceList(headlineIndex);
              setArticleStatus(headlineIndex, `Selected sentence ${nextIndex + 1}.`);
              return;
            }

            if (action === "select-sentence") {
              if (!record.loaded || !record.sentences.length || !Number.isFinite(sentenceIndex)) {
                return;
              }
              record.currentSentenceIndex = Math.min(
                Math.max(sentenceIndex, 0),
                record.sentences.length - 1
              );
              renderSentenceList(headlineIndex);
              setArticleStatus(headlineIndex, `Selected sentence ${record.currentSentenceIndex + 1}.`);
              return;
            }

            if (action === "play-sentence-trio") {
              if (!record.loaded) {
                await loadArticleTranslations(headlineIndex);
              }
              const indexToPlay = Number.isFinite(sentenceIndex) ? sentenceIndex : record.currentSentenceIndex;
              stopArticlePlayback();
              setArticleStatus(headlineIndex, `Playing sentence ${indexToPlay + 1} EN → FA → RU...`);
              await speakSentenceTrio(headlineIndex, indexToPlay);
              setArticleStatus(headlineIndex, `Finished sentence ${indexToPlay + 1}.`);
              return;
            }
          } catch (error) {
            setArticleStatus(headlineIndex, `Action failed: ${error.message}`);
          }

          return;
        }

        const button = event.target.closest("button[data-speak-lang][data-speak-text]");
        if (!button) {
          return;
        }

        const text = button.getAttribute("data-speak-text") || "";
        const lang = button.getAttribute("data-speak-lang") || "en-US";
        const speakKey = button.getAttribute("data-speak-key") || `${lang}:${text.slice(0, 48)}`;
        const highlightTargetId = button.getAttribute("data-highlight-target") || "";
        const trackerLabel = button.getAttribute("data-tracker-label") || "";

        const isAlreadySpeaking = Boolean(state.currentSpeakKey && state.currentSpeakKey === speakKey && window.speechSynthesis && window.speechSynthesis.speaking);
        if (isAlreadySpeaking) {
          stopAllSpeech();
          state.currentSpeakKey = "";
          return;
        }

        try {
          stopArticlePlayback();
          state.currentSpeakKey = speakKey;
          await speakText(text, lang, {
            highlightTargets: highlightTargetId ? [{ id: highlightTargetId, text }] : [],
            trackerLabel
          });
        } catch (error) {
          setStatus(`Speak failed: ${error.message}`, "error");
        } finally {
          state.currentSpeakKey = "";
        }
      });

      stopSpeechBtn.addEventListener("click", () => {
        const headlinePaused = state.headlinePlayback.active || hasPausedHeadlinePlayback();
        const articlePaused = state.globalPlayback.active || hasPausedGlobalPlayback();
        stopArticlePlayback();
        state.currentSpeakKey = "";
        if (headlinePaused) {
          setStatus(getHeadlinePauseLabel(), "");
          return;
        }
        if (articlePaused) {
          setStatus(getGlobalPauseLabel(), "");
          return;
        }
        setStatus("Speech stopped.", "");
      });

      readAllHeadlinesBtn.addEventListener("click", async () => {
        try {
          await playAllHeadlines();
        } catch (error) {
          setStatus(`Read Headlines failed: ${error.message}`, "error");
        }
      });

      playAllArticlesBtn.addEventListener("click", async () => {
        try {
          await playAllArticles();
        } catch (error) {
          setStatus(`Play All failed: ${error.message}`, "error");
        }
      });

      loadNewBtn.addEventListener("click", async () => {
        await runFetchAndTranslate({
          onlyUnseen: true,
          targetCount: getRequestedCount(),
          markSeen: true
        });
      });

      loadBookBtn.addEventListener("click", async () => {
        await runFetchRandomBook();
      });

      maxItemsInput.addEventListener("input", () => {
        updateLoadNewButtonLabel();
      });

      controls.addEventListener("submit", async (event) => {
        event.preventDefault();
        await runFetchAndTranslate({
          onlyUnseen: false,
          targetCount: getRequestedCount(),
          markSeen: true
        });
      });

      if (window.speechSynthesis) {
        state.voices = window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => {
          state.voices = window.speechSynthesis.getVoices();
        };
        refreshVoices().catch((error) => console.warn("Voice refresh failed:", error));
      }
      updateLoadNewButtonLabel();
      updatePlaybackButtons();

    })();
  </script>
</body>
</html>
